<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
/* =============================================
   CODEX VITA — PAWAW · Grimoire Épisode 00
   Images : ./assets/imgNNN.ext

============================================= */
:root {
  --or       : #d4af37;
  --or-clair : #ffd700;
  --sep      : rgba(212,175,55,.28);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family : Georgia, 'Times New Roman', serif;
  background  : #000;
  color       : var(--or);
  overflow    : hidden;
  user-select : none;
}

/* ── ÉCLAIRS VEINEUX ─────────────────────── */
#lightning-bg {
  position       : fixed;
  inset          : 0;
  pointer-events : none;
  z-index        : 1;
  overflow       : hidden;
  background     : #000;
}
.vein {
  position   : absolute;
  inset      : 0;
  opacity    : 0;
  mix-blend-mode : screen;
  filter     : blur(1.4px) drop-shadow(0 0 7px currentColor);
  animation  : pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:0; }
  44%     { opacity:0; }
  50%     { opacity:.62; }
  56%     { opacity:0; }
}

/* ── HEADER ──────────────────────────────── */
#header {
  position    : fixed;
  top         : 0; left:0; width:100%;
  z-index     : 30;
  display     : flex;
  align-items : center;
  padding     : 16px 44px;
  background  : linear-gradient(180deg,#000 0%,rgba(0,0,0,.5) 80%,transparent 100%);
  border-bottom : 1px solid var(--sep);
  gap         : 0;
}
#header > * + * { border-left: 1px solid var(--sep); }
#header > *     { padding: 0 28px; }

#header img.logo {
  height        : 62px;
  width         : auto;
  border-radius : 8px;
  box-shadow    : 0 0 22px rgba(120,180,255,.5);
  padding       : 0;
  margin-right  : 28px;
}
#header .titles {
  display        : flex;
  flex-direction : column;
  gap            : 7px;
  line-height    : 1;
}
#header .brand {
  font-size      : 32px;
  font-weight    : bold;
  letter-spacing : 7px;
  background     : linear-gradient(90deg,#9fd8ff,#ff7ad9,#ffd700,#9fd8ff);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color          : transparent;
  animation      : shimmer 6s linear infinite;
}
@keyframes shimmer { to { background-position:300% 0; } }
#header .slogan {
  font-size      : 12.5px;
  letter-spacing : 2px;
  color          : var(--or-clair);
}
#header .slogan b { color:#ff9ee0; }
#header .ep {
  text-align     : right;
  font-size      : 11px;
  color          : #9fb8e8;
  letter-spacing : 1px;
  line-height    : 1.9;
  opacity        : .85;
}
#header .ep span {
  display        : block;
  color          : var(--or);
  font-size      : 14px;
  letter-spacing : 2px;
}
#lang-wrap {
  margin-left    : auto;
  display        : flex;
  flex-direction : column;
  align-items    : flex-end;
  gap            : 7px;
}
#lang-wrap label {
  font-size      : 10px;
  letter-spacing : 1px;
  color          : #9fb8e8;
  text-transform : uppercase;
}
#lang {
  background    : #0c0c0c;
  color         : var(--or);
  border        : 1px solid var(--or);
  border-radius : 18px;
  padding       : 7px 14px;
  font-family   : inherit;
  font-size     : 13px;
  cursor        : pointer;
  max-width     : 200px;
}
#lang:focus { outline: 2px solid var(--or-clair); }

/* ── GRIMOIRE 3D ─────────────────────────── */
#stage {
  position        : fixed;
  inset           : 0;
  z-index         : 10;
  display         : flex;
  align-items     : center;
  justify-content : center;
  padding         : 144px 40px 128px;
}
#book-container {
  perspective : 1700px;
  width       : 90vw;
  max-width   : 1180px;
  height      : 65vh;
  max-height  : 700px;
}
#book {
  width            : 100%;
  height           : 100%;
  transform-style  : preserve-3d;
  transform        : rotateX(6deg) rotateY(-17deg) rotateZ(1.5deg);
  transition       : transform .7s cubic-bezier(.34,1.56,.64,1);
}
#book.open { transform: rotateX(3deg) rotateY(0deg) rotateZ(0deg); }

/* tranche visible du livre */
#book::before {
  content         : "";
  position        : absolute;
  left            : 50%;
  top             : -3%;
  height          : 106%;
  width           : 28px;
  transform       : translateX(-50%) translateZ(-14px);
  background      : repeating-linear-gradient(180deg,#000 0 6px,#171717 6px 12px);
  box-shadow      : 0 0 26px rgba(157,78,221,.4), inset 0 0 10px #000;
  border-radius   : 4px;
}

.page {
  position         : absolute;
  top              : 0;
  height           : 100%;
  width            : 50%;
  background       : radial-gradient(ellipse at 50% 30%,#09090e 0%,#000 70%);
  border           : 2px solid var(--or);
  box-shadow       : inset 0 0 70px rgba(0,0,0,.9),
                     inset 0 0 28px rgba(212,175,55,.05);
  transform-style  : preserve-3d;
  overflow         : hidden;
}
#left-page {
  left            : 0;
  border-right    : 1px solid var(--or);
  transform       : rotateY(16deg);
  display         : flex;
  flex-direction  : column;
  padding         : 46px 44px;
}
#right-page {
  right           : 0;
  border-left     : 1px solid var(--or);
  transform       : rotateY(-16deg);
  padding         : 40px;
}

/* page gauche — narration ------------------- */
.eyebrow {
  font-size      : 11px;
  letter-spacing : 4px;
  color          : #9fb8e8;
  text-transform : uppercase;
  padding-bottom : 16px;
  border-bottom  : 1px solid var(--sep);
}
.ptitle {
  font-size      : 24px;
  color          : var(--or-clair);
  margin         : 26px 0 22px;
  line-height    : 1.25;
  border-bottom  : 2px solid var(--or);
  padding-bottom : 16px;
  text-shadow    : 0 0 16px rgba(212,175,55,.5);
}
.narration {
  color          : var(--or);
  font-style     : italic;
  font-size      : 16px;
  line-height    : 2.05;
  white-space    : pre-line;
  text-shadow    : 0 0 10px rgba(212,175,55,.28);
  overflow-y     : auto;
  flex           : 1;
  padding-right  : 10px;
}
.narration.rtl    { direction:rtl; text-align:right; padding-right:0; padding-left:10px; }
.narration.loading{ opacity:.45; }
.pfoot {
  margin-top     : 26px;
  padding-top    : 18px;
  border-top     : 1px solid var(--sep);
  font-size      : 11px;
  color          : #9fb8e8;
  letter-spacing : 2px;
  opacity        : .82;
}

/* page droite — grille de cases ------------- */
.cases { display:grid; gap:24px; width:100%; height:100%; }
.cases[data-n="1"] { grid-template-columns:1fr;       grid-template-rows:1fr; }
.cases[data-n="2"] { grid-template-columns:1fr;       grid-template-rows:1fr 1fr; }
.cases[data-n="3"] { grid-template-columns:1fr 1fr;   grid-template-rows:1fr 1fr; }
.cases[data-n="3"] .case:nth-child(1) { grid-column:1/3; }
.cases[data-n="4"] { grid-template-columns:1fr 1fr;   grid-template-rows:1fr 1fr; }
.cases[data-n="5"] { grid-template-columns:1fr 1fr 1fr; grid-template-rows:1fr 1fr; }
.cases[data-n="5"] .case:nth-child(1) { grid-column:1/3; grid-row:1/3; }

.case {
  position      : relative;
  cursor        : pointer;
  border        : 2px solid var(--or);
  border-radius : 8px;
  overflow      : hidden;
  background    : #000;
  box-shadow    : 0 0 18px rgba(212,175,55,.15);
  transition    : transform .25s, box-shadow .25s, border-color .25s;
}
.case:hover {
  transform     : scale(1.03);
  border-color  : var(--or-clair);
  box-shadow    : 0 0 30px rgba(212,175,55,.6);
  z-index       : 2;
}
.case img,
.case video {
  width         : 100%;
  height        : 100%;
  object-fit    : cover;
  display       : block;
}
.zoom-hint {
  position      : absolute;
  bottom        : 8px;
  right         : 10px;
  font-size     : 10px;
  color         : var(--or-clair);
  background    : rgba(0,0,0,.78);
  padding       : 3px 9px;
  border-radius : 10px;
  opacity       : 0;
  transition    : opacity .25s;
  letter-spacing: 1px;
}
.case:hover .zoom-hint { opacity:1; }

/* ── COMPTEUR ────────────────────────────── */
#counter {
  position      : fixed;
  top           : 126px;
  right         : 34px;
  z-index       : 20;
  font-size     : 14px;
  font-weight   : bold;
  background    : rgba(0,0,0,.85);
  padding       : 10px 18px;
  border        : 1px solid var(--or);
  border-radius : 20px;
}

/* ── CONTRÔLES ───────────────────────────── */
#controls {
  position        : fixed;
  bottom          : 32px;
  left            : 50%;
  transform       : translateX(-50%);
  z-index         : 20;
  display         : flex;
  gap             : 18px;
  background      : rgba(0,0,0,.92);
  padding         : 14px 30px;
  border          : 2px solid var(--or);
  border-radius   : 50px;
  backdrop-filter : blur(8px);
}
button {
  background    : #0c0c0c;
  color         : var(--or);
  border        : 1px solid var(--or);
  padding       : 11px 24px;
  cursor        : pointer;
  border-radius : 24px;
  font-family   : inherit;
  font-weight   : bold;
  letter-spacing: 1px;
  transition    : all .25s;
}
button:hover:not(:disabled) {
  background : var(--or);
  color      : #000;
  box-shadow : 0 0 20px rgba(212,175,55,.6);
}
button:disabled { opacity:.35; cursor:not-allowed; }

/* ── FULLSCREEN ──────────────────────────── */
#modal {
  display         : none;
  position        : fixed;
  inset           : 0;
  z-index         : 1000;
  background      : rgba(0,0,0,.97);
  align-items     : center;
  justify-content : center;
  animation       : fade .3s;
}
#modal.active { display:flex; }
@keyframes fade { from{opacity:0} to{opacity:1} }

#modal .inner {
  position       : relative;
  max-width      : 92vw;
  max-height     : 92vh;
  display        : flex;
  flex-direction : column;
  align-items    : center;
}
#modal img,
#modal video {
  max-width     : 100%;
  max-height    : 72vh;
  object-fit    : contain;
  border        : 2px solid var(--or);
  border-radius : 6px;
  box-shadow    : 0 0 40px rgba(212,175,55,.4);
}
#modal .cap {
  margin-top     : 28px;
  max-width      : 820px;
  text-align     : center;
  font-style     : italic;
  font-size      : 18px;
  line-height    : 1.9;
  color          : var(--or);
  white-space    : pre-line;
  text-shadow    : 0 0 14px rgba(212,175,55,.5);
}
#modal .close {
  position    : absolute;
  top         : -8px;
  right       : 4px;
  font-size   : 44px;
  cursor      : pointer;
  color       : var(--or);
  font-weight : bold;
  line-height : 1;
}
#modal .close:hover { color:var(--or-clair); text-shadow:0 0 18px rgba(212,175,55,.8); }

/* ── SCROLLBAR ───────────────────────────── */
::-webkit-scrollbar       { width:8px; }
::-webkit-scrollbar-track { background:rgba(212,175,55,.1); }
::-webkit-scrollbar-thumb { background:var(--or); border-radius:4px; }

/* ── RESPONSIVE ──────────────────────────── */
@media (max-width:860px) {
  #book { transform:none !important; }
  #left-page  { transform:none; width:100%; position:relative; height:auto; padding:30px 24px; }
  #right-page { transform:none; width:100%; position:relative; height:46vh; padding:24px; }
  #book-container { height:auto; overflow-y:auto; }
  #stage  { padding:130px 16px 118px; }
  #header { flex-wrap:wrap; gap:12px; padding:14px 20px; }
  #header > * + * { border-left:none; }
  #header > *     { padding:0 12px; }
  #header .brand  { font-size:22px; }
}
</style>
</head>

/* ── DÉCOUPE IMAGES PAR PAGE ─────────────── */
const pageImages = [];
let _i = 0;
for (const c of caseCounts) { pageImages.push(images.slice(_i, _i + c)); _i += c; }
const TOTAL = FR.length;

/* ── CACHE MÉMOIRE ───────────────────────── */
const cache = { fr:{}, en:{} };
FR.forEach((p,i) => cache.fr[i] = { an:p.an, t:p.t, n:p.n });
EN.forEach((p,i) => cache.en[i] = { an:FR[i].an, t:p.t, n:p.n });

let cur = 0, open = false, curLang = 'fr';

/* ── SÉLECTEUR DE LANGUE ─────────────────── */
const sel = document.getElementById('lang');
LANGS.forEach(l => {
  const o = document.createElement('option');
  o.value = l.code; o.textContent = l.name;
  sel.appendChild(o);
});
sel.value = 'fr';
sel.onchange = () => { curLang = sel.value; render(); };

/* ── TRADUCTION : mémoire → Supabase → API → save ── */
async function ensureTranslation(lang, i) {
  const base = lang.split('-')[0];
  if (base === 'fr') return cache.fr[i];
  if (base === 'en' && cache.en[i]) return cache.en[i];
  cache[lang] = cache[lang] || {};
  if (cache[lang][i]) return cache[lang][i];
  const langName = (LANGS.find(l => l.code === lang) || {}).name || lang;

  if (window.VITABackend && VITABackend.ready()) {
    try {
      const c = await VITABackend.getCached(lang, i);
      if (c && c.narration) { cache[lang][i] = { an:FR[i].an, t:c.title||FR[i].t, n:c.narration }; return cache[lang][i]; }
    } catch(e) {}
  }

  let title = FR[i].t, narration = FR[i].n, ok = false;
  try {
    if (window.VITABackend && VITABackend.ready() && window.VITA_BACKEND.translateFunction) {
      const r = await VITABackend.translate(lang, langName, FR[i].t, FR[i].n);
      title = r.title || title; narration = r.narration || narration; ok = true;
    } else {
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1000,
          messages:[{ role:'user', content:
            `Translate this fantasy-game lore into ${langName}. Keep the poetic, mythic tone. Keep proper nouns (VitA, PAWAW, UTOP, ANARK, BRAHAM, Vy, Moria, Saï, HoloAid, Templabo, Librarchie) unchanged. Respond with ONLY raw JSON, no markdown: {"title":"...","narration":"..."}\n\nTITLE: ${FR[i].t}\nNARRATION: ${FR[i].n}` }]
        })
      });
      const data = await r.json();
      let txt = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
      txt = txt.replace(/```json|```/g,'').trim();
      const obj = JSON.parse(txt);
      title = obj.title || title; narration = obj.narration || narration; ok = true;
    }
  } catch(e) { return cache.en[i] || cache.fr[i]; }

  cache[lang][i] = { an:FR[i].an, t:title, n:narration };
  if (ok && window.VITABackend && VITABackend.ready()) {
    VITABackend.saveCached(lang, i, title, narration).catch(()=>{});
  }
  return cache[lang][i];
}

/* ── RENDU ───────────────────────────────── */
function paintCases() {
  const imgs  = pageImages[cur] || [];
  const cases = document.getElementById('cases');
  cases.setAttribute('data-n', imgs.length);
  cases.innerHTML = '';
  imgs.forEach(name => {
    const d    = document.createElement('div');
    d.className = 'case';
    const u    = SRC(name);
    const isVid = /\.(mp4|webm|mov)$/i.test(name);
    d.innerHTML = (isVid
      ? `<video src="${u}" muted loop playsinline autoplay></video>`
      : `<img src="${u}" alt="">`)
      + `<span class="zoom-hint">${ui().full}</span>`;
    d.onclick = () => openModal(u, isVid,
      document.getElementById('ptitle').textContent + '\n' +
      document.getElementById('narration').textContent);
    cases.appendChild(d);
  });
  document.getElementById('pfoot').textContent = `${imgs.length} ${ui().cases}`;
}

function paintText(obj, loading) {
  const isRTL = (LANGS.find(l => l.code === curLang) || {}).rtl;
  document.getElementById('eyebrow').textContent   = obj.an;
  document.getElementById('ptitle').textContent    = obj.t;
  const nar = document.getElementById('narration');
  nar.textContent = loading ? (ui().tr + '\n\n' + obj.n) : obj.n;
  nar.classList.toggle('rtl',    !!isRTL);
  nar.classList.toggle('loading', !!loading);
}

function paintUI() {
  document.getElementById('prev').textContent  = ui().prev;
  document.getElementById('next').textContent  = ui().next;
  document.getElementById('toggle').textContent= open ? ui().close : ui().open;
  document.getElementById('lbl-page').textContent = ui().page;
  document.getElementById('prev').disabled  = (cur === 0);
  document.getElementById('next').disabled  = (cur === TOTAL - 1);
  document.getElementById('cur').textContent = cur + 1;
  document.getElementById('tot').textContent = TOTAL;
}

async function render() {
  const i = cur, lang = curLang, base = lang.split('-')[0];
  paintUI(); paintCases();
  const cached = (base === 'fr') ? cache.fr[i] : (cache[lang] && cache[lang][i]);
  paintText(cached || cache.fr[i], !cached);
  if (!cached) {
    const t = await ensureTranslation(lang, i);
    if (cur === i && curLang === lang) paintText(t, false);
    paintCases();
  }
}

/* ── MODAL ───────────────────────────────── */
function openModal(url, isVid, cap) {
  const img = document.getElementById('m-img');
  let   vid = document.getElementById('m-vid');
  if (isVid) {
    img.style.display = 'none';
    if (!vid) {
      vid = document.createElement('video');
      vid.id = 'm-vid'; vid.controls = true; vid.autoplay = true;
      vid.style.cssText = 'max-width:100%;max-height:72vh;border:2px solid var(--or);border-radius:6px;';
      img.parentNode.insertBefore(vid, img);
    }
    vid.src = url; vid.style.display = 'block';
  } else {
    if (vid) { vid.style.display = 'none'; vid.pause && vid.pause(); }
    img.style.display = 'block'; img.src = url;
  }
  document.getElementById('m-cap').textContent = cap;
  document.getElementById('modal').classList.add('active');
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }

/* ── ÉVÉNEMENTS ──────────────────────────── */
document.getElementById('next').onclick   = () => { if (cur < TOTAL-1) { cur++; render(); } };
document.getElementById('prev').onclick   = () => { if (cur > 0)       { cur--; render(); } };
document.getElementById('toggle').onclick = () => {
  open = !open;
  document.getElementById('book').classList.toggle('open', open);
  document.getElementById('toggle').textContent = open ? ui().close : ui().open;
};
document.querySelector('#modal .close').onclick     = closeModal;
document.getElementById('modal').onclick = e => { if (e.target.id === 'modal') closeModal(); };
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && cur < TOTAL-1) { cur++; render(); }
  if (e.key === 'ArrowLeft'  && cur > 0)       { cur--; render(); }
  if (e.key === 'Escape') closeModal();
});

/* ── ÉCLAIRS VEINEUX ─────────────────────── */
(function () {
  const bg   = document.getElementById('lightning-bg');
  const cols = ['#00ffff','#9d4edd','#ff006e','#ffd700','#00ff88','#7ab8ff'];
  const ns   = 'http://www.w3.org/2000/svg';
  for (let i = 0; i < 7; i++) {
    const svg = document.createElementNS(ns,'svg');
    svg.setAttribute('viewBox','0 0 1000 1000');
    svg.setAttribute('preserveAspectRatio','none');
    svg.classList.add('vein');
    svg.style.color = cols[i % cols.length];
    const mk = () => {
      const p = document.createElementNS(ns,'path');
      let x = Math.random() * 1000, y = 0, d = `M ${x} 0`;
      while (y < 1000) {
        y += 80 + Math.random() * 120;
        x += (Math.random() - .5) * 260;
        d += ` L ${x.toFixed(0)} ${y.toFixed(0)}`;
      }
      p.setAttribute('d', d);
      p.setAttribute('stroke', cols[i % cols.length]);
      p.setAttribute('stroke-width', (1 + Math.random() * 2).toFixed(1));
      p.setAttribute('fill','none');
      return p;
    };
    svg.appendChild(mk()); svg.appendChild(mk());
    svg.style.animationDelay = `${(Math.random() * .6).toFixed(2)}s`;
    bg.appendChild(svg);
  }
})();

render();
</script>
